name: Economic Indicators Sync (FRED)

on:
  schedule:
    # Senin & Kamis 02:00 UTC — menangkap keputusan FOMC (biasanya Rabu) dalam 1 hari.
    - cron: "0 2 * * 1,4"
  workflow_dispatch: {}   # bisa dijalankan manual dari tab Actions

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync economic indicators (Fed Funds, Japan 10Y) dari FRED
        env:
          # URL Supabase bukan rahasia → hardcode (sama seperti worker lain).
          SUPABASE_URL: https://hmkeqvxcifggxownzrhx.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/indicators-sync.mjs
