# ============================================================
# DINONAKTIFKAN (Juli 2026) — audit legal.
# Skrip fundamentals-debug.mjs sudah dilumpuhkan menjadi stub yang tidak melakukan
# permintaan jaringan sama sekali. Jadwal cron di bawah SENGAJA dikomentari
# supaya workflow tidak lagi berjalan otomatis.
# Alasan lengkap + jalur pengganti yang sah ada di komentar fundamentals-sync.mjs.
# workflow_dispatch sengaja DIBIARKAN aktif supaya kamu masih bisa membuka
# workflow-nya dan melihat pesan penjelasan bila suatu saat lupa kenapa mati.
# ============================================================
# Diagnostik dividend yield — cetak field mentah Yahoo ke log (TIDAK menulis DB).
# Taruh di: .github/workflows/fundamentals-debug.yml
# Skrip:    scripts/fundamentals-debug.mjs
# Jalankan: Actions -> "Fundamentals Debug" -> Run workflow (boleh isi daftar simbol).
name: Fundamentals Debug

on:
  workflow_dispatch:
    inputs:
      symbols:
        description: 'Daftar simbol dipisah koma (tanpa .JK)'
        required: false
        default: 'MSTI,MPMX,TLDN,BSSR,ADRO,BBCA,SIDO'

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Cetak field dividend Yahoo
        env:
          SYMBOLS: ${{ inputs.symbols }}
        run: node scripts/fundamentals-debug.mjs
